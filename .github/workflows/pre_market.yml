name: Pre-market (6:00 AM ET)

on:
  schedule:
    - cron: '0 10 * * 1-5'   # 10:00 UTC = 6:00 AM ET (EDT). Change to '0 11' in winter (EST).
  workflow_dispatch:           # Manual trigger from GitHub UI

concurrency:
  group: tradingbot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run pre-market routine
        run: python main.py pre_market
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER: ${{ secrets.ALPACA_PAPER }}

      - name: Commit memory updates
        run: |
          git config user.name "TradingBot"
          git config user.email "bot@tradingbot.local"
          git add memory/
          git diff --staged --quiet || git commit -m "pre_market: $(date -u +'%Y-%m-%d')"
          git push
