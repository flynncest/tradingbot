name: End of Day (3:00 PM ET)

on:
  schedule:
    - cron: '0 19 * * 1-5'   # 19:00 UTC = 3:00 PM ET (EDT). Change to '0 20' in winter (EST).
  workflow_dispatch:

concurrency:
  group: tradingbot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run end-of-day routine
        run: python main.py end_of_day
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER: ${{ secrets.ALPACA_PAPER }}

      - name: Commit memory updates
        run: |
          git config user.name "TradingBot"
          git config user.email "bot@tradingbot.local"
          git add memory/
          git diff --staged --quiet || git commit -m "end_of_day: $(date -u +'%Y-%m-%d')"
          git push
