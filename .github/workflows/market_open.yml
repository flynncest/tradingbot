name: Market Open (8:30 AM ET)

on:
  schedule:
    - cron: '30 12 * * 1-5'  # 12:30 UTC = 8:30 AM ET (EDT). Change to '30 13' in winter (EST).
  workflow_dispatch:

concurrency:
  group: tradingbot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run market-open routine
        run: python main.py market_open
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER: ${{ secrets.ALPACA_PAPER }}

      - name: Commit memory updates
        run: |
          git config user.name "TradingBot"
          git config user.email "bot@tradingbot.local"
          git add memory/
          git diff --staged --quiet || git commit -m "market_open: $(date -u +'%Y-%m-%d')"
          git push
